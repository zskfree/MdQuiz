<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>题库练习</title>
</head>

<body>
  <div id="root"></div>
  <script>
    ; (() => {
      if (window.__MDQUIZ_VITE_MANAGED__ === true) {
        return
      }

      const reloadFlag = 'mdquiz-reload-on-asset-error'
      const repositoryBasePath = '/MdQuiz/'
      const localHosts = new Set(['localhost', '127.0.0.1'])
      const isLocalDev = localHosts.has(window.location.hostname)
      const root = document.getElementById('root')

      const normalizeBasePath = (value) => {
        if (value === '/') {
          return '/'
        }

        return `/${value.replace(/^\/+|\/+$/g, '')}/`
      }

      const pathname = window.location.pathname || '/'
      const usesRepositoryBase =
        pathname === repositoryBasePath.slice(0, -1) || pathname.startsWith(repositoryBasePath)
      const productionBasePath = usesRepositoryBase ? repositoryBasePath : '/'
      const assetBasePath = normalizeBasePath(productionBasePath)

      const appendStyle = (href) => {
        if (document.querySelector(`link[rel="stylesheet"][href="${href}"]`)) {
          return
        }

        const link = document.createElement('link')
        link.rel = 'stylesheet'
        link.href = href
        link.crossOrigin = 'anonymous'
        document.head.appendChild(link)
      }

      const showFailure = (attemptedUrl, error) => {
        const hint = document.createElement('p')
        hint.style.padding = '16px'
        hint.style.color = '#b91c1c'
        hint.textContent = '页面资源加载失败：请确认已提交最新构建产物，或将 GitHub Pages 的发布源切换为 GitHub Actions。'
        document.body.appendChild(hint)

        const detail = document.createElement('pre')
        detail.style.padding = '0 16px 16px'
        detail.style.margin = '0'
        detail.style.color = '#9f1239'
        detail.style.whiteSpace = 'pre-wrap'
        detail.textContent = ['已尝试加载入口：', attemptedUrl, '', '错误信息：', String(error)].join('\n')
        document.body.appendChild(detail)
      }

      const reloadOnce = () => {
        if (sessionStorage.getItem(reloadFlag) === '1') {
          return false
        }

        sessionStorage.setItem(reloadFlag, '1')
        window.location.reload()
        return true
      }

      const isAppMounted = () => Boolean(root && root.childNodes.length > 0)

      const bootDevelopmentEntry = async () => {
        await import('/src/main.tsx')
      }

      const bootProductionEntry = async () => {
        const styleUrl = `${assetBasePath}assets/index.css`
        const scriptUrl = new URL(`${assetBasePath}assets/index.js`, window.location.origin).toString()

        appendStyle(styleUrl)
        await import(scriptUrl)
      }

      const boot = async () => {
        try {
          if (isLocalDev) {
            await bootDevelopmentEntry()
            return
          }

          await bootProductionEntry()
        } catch (error) {
          if (reloadOnce()) {
            return
          }

          const attemptedUrl = isLocalDev
            ? new URL('/src/main.tsx', window.location.origin).toString()
            : new URL(`${assetBasePath}assets/index.js`, window.location.origin).toString()

          if (!isAppMounted()) {
            showFailure(attemptedUrl, error)
          }
        }
      }

      window.addEventListener('unhandledrejection', (event) => {
        const message = String((event.reason && event.reason.message) || event.reason || '')

        if (
          message.includes('Failed to fetch dynamically imported module') ||
          message.includes('Importing a module script failed')
        ) {
          reloadOnce()
        }
      })

      void boot()
    })()
  </script>
</body>

</html>
