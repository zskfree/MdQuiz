<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>题库练习</title>
  <script>
    ; (() => {
      const reloadFlag = 'mdquiz-reload-on-asset-error'

      const reloadOnce = () => {
        if (sessionStorage.getItem(reloadFlag) === '1') {
          return
        }

        sessionStorage.setItem(reloadFlag, '1')
        window.location.reload()
      }

      window.addEventListener(
        'error',
        (event) => {
          const target = event.target

          if (target instanceof HTMLScriptElement) {
            reloadOnce()
          }
        },
        true,
      )

      window.addEventListener('unhandledrejection', (event) => {
        const message = String((event.reason && event.reason.message) || event.reason || '')

        if (
          message.includes('Failed to fetch dynamically imported module') ||
          message.includes('Importing a module script failed')
        ) {
          reloadOnce()
        }
      })
    })()
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module">
    const localHosts = new Set(['localhost', '127.0.0.1'])
    const isLocalDev = localHosts.has(window.location.hostname)

    const appendStyle = (href) => {
      const link = document.createElement('link')
      link.rel = 'stylesheet'
      link.href = href
      link.crossOrigin = 'anonymous'
      document.head.appendChild(link)
    }

    const bootstrap = async () => {
      if (isLocalDev) {
        await import('/src/main.tsx')
        return
      }

      // Deploy fallback: allow both correct root publish and mistaken repo-root publish.
      appendStyle('/assets/index.css')
      appendStyle('/dist/assets/index.css')

      const candidates = ['/assets/index.js', '/dist/assets/index.js']
      for (const entry of candidates) {
        try {
          await import(entry)
          return
        } catch {
          // Try next candidate.
        }
      }

      const hint = document.createElement('p')
      hint.style.padding = '16px'
      hint.style.color = '#b91c1c'
      hint.textContent = '页面资源加载失败：请确认服务器发布的是 dist 目录内容。'
      document.body.appendChild(hint)
    }

    void bootstrap()
  </script>
</body>

</html>
