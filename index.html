<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>题库练习</title>
  <script>
    ; (() => {
      const reloadFlag = 'mdquiz-reload-on-asset-error'

      const reloadOnce = () => {
        if (sessionStorage.getItem(reloadFlag) === '1') {
          return
        }

        sessionStorage.setItem(reloadFlag, '1')
        window.location.reload()
      }

      window.addEventListener(
        'error',
        (event) => {
          const target = event.target

          if (target instanceof HTMLScriptElement) {
            reloadOnce()
          }
        },
        true,
      )

      window.addEventListener('unhandledrejection', (event) => {
        const message = String((event.reason && event.reason.message) || event.reason || '')

        if (
          message.includes('Failed to fetch dynamically imported module') ||
          message.includes('Importing a module script failed')
        ) {
          reloadOnce()
        }
      })
    })()
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module">
    const localHosts = new Set(['localhost', '127.0.0.1'])
    const isLocalDev = localHosts.has(window.location.hostname)

    const normalizePath = (value) => {
      const normalized = value.replace(/\/+/g, '/')
      return normalized.startsWith('/') ? normalized : `/${normalized}`
    }

    const ensureTrailingSlash = (value) => (value.endsWith('/') ? value : `${value}/`)

    const absoluteUrl = (path) => new URL(path, window.location.origin).toString()

    const unique = (items) => Array.from(new Set(items))

    const candidateRoots = unique(
      [new URL('./', window.location.href).pathname, new URL('../', window.location.href).pathname, '/'].map(
        (path) => ensureTrailingSlash(normalizePath(path)),
      ),
    )

    const buildCandidates = (assetPath) =>
      unique(
        candidateRoots.flatMap((root) => [
          absoluteUrl(normalizePath(`${root}${assetPath}`)),
          absoluteUrl(normalizePath(`${root}dist/${assetPath}`)),
        ]),
      )

    const appendStyle = (href) => {
      if (document.querySelector(`link[rel="stylesheet"][href="${href}"]`)) {
        return
      }

      const link = document.createElement('link')
      link.rel = 'stylesheet'
      link.href = href
      link.crossOrigin = 'anonymous'
      document.head.appendChild(link)
    }

    const bootstrap = async () => {
      if (isLocalDev) {
        await import('/src/main.tsx')
        return
      }

      // Deploy fallback: probe multiple roots for both project-path deploy and mistaken publish roots.
      const styleCandidates = buildCandidates('assets/index.css')
      styleCandidates.forEach((href) => appendStyle(href))

      const candidates = buildCandidates('assets/index.js')
      const attempted = []
      for (const entry of candidates) {
        try {
          attempted.push(entry)
          await import(entry)
          return
        } catch {
          // Try next candidate.
        }
      }

      const hint = document.createElement('p')
      hint.style.padding = '16px'
      hint.style.color = '#b91c1c'
      hint.textContent = '页面资源加载失败：请确认服务器发布的是 dist 目录内容。'
      document.body.appendChild(hint)

      const detail = document.createElement('pre')
      detail.style.padding = '0 16px 16px'
      detail.style.margin = '0'
      detail.style.color = '#9f1239'
      detail.style.whiteSpace = 'pre-wrap'
      detail.textContent = ['已尝试加载以下脚本：', ...attempted].join('\n')
      document.body.appendChild(detail)
    }

    void bootstrap()
  </script>
</body>

</html>
